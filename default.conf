server {
    listen 3000 default_server;
    listen [::]:3000 default_server;
    server_name _;

    # Static assets dengan hash (cache forever)
    location ^~ /assets/ {
        root /app/dist/client;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # File statis di root client (favicon, logo, manifest, dll)
    location ~* \.(png|ico|svg|webp|jpg|jpeg|gif|woff|woff2|ttf|webmanifest|txt|xml)$ {
        root /app/dist/client;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri @ssr;
    }

    # Semua lainnya → Bun SSR
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location @ssr {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}